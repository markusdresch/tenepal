<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tenepal Dashboard</title>
<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460; --fg: #e0e0e0; --fg2: #a0a0b0;
  --accent: #e94560; --ok: #4ecca3; --warn: #ffc857; --err: #e94560;
  --nah: #ff6b6b; --spa: #ffc857; --oth: #888; --may: #4ecca3; --unk: #666;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px;
       background: var(--bg); color: var(--fg); }

/* Header */
.header { background: var(--bg2); padding: 10px 16px; border-bottom: 2px solid var(--bg3);
          display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.header h1 { font-size: 15px; color: var(--accent); white-space: nowrap; }
.header a { color: var(--fg2); text-decoration: none; font-size: 11px; }
.header a:hover { color: var(--accent); }
.stat { background: var(--bg3); padding: 3px 8px; border-radius: 3px; font-size: 11px; }
.stat b { color: var(--ok); }
.stat.err b { color: var(--err); }

/* Controls bar */
.controls { background: var(--bg2); padding: 8px 16px; border-bottom: 1px solid var(--bg3);
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.controls label { font-size: 11px; color: var(--fg2); }
.controls select, .controls input {
  background: var(--bg); color: var(--fg); border: 1px solid var(--bg3);
  padding: 3px 6px; border-radius: 3px; font-size: 11px; font-family: inherit; }
.controls select { min-width: 80px; }
.controls input[type=text] { width: 150px; }
.btn { background: var(--bg3); color: var(--fg); border: none; padding: 4px 10px;
       border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; }
.btn:hover { background: var(--accent); }
.btn.active { background: var(--accent); }

/* Audio player bar */
.player-bar { background: var(--bg2); padding: 6px 16px; border-bottom: 1px solid var(--bg3);
              display: flex; align-items: center; gap: 12px; }
.player-bar audio { height: 28px; flex-shrink: 0; }
.player-info { font-size: 11px; color: var(--fg2); }
.player-info b { color: var(--fg); }

/* Count */
#count { font-size: 11px; color: var(--fg2); padding: 4px 16px; }

/* Table */
.table-wrap { overflow-x: auto; padding: 0 4px; }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; z-index: 10; }
th { background: var(--bg3); color: var(--fg); padding: 5px 6px; text-align: left;
     font-size: 10px; font-weight: 600; cursor: pointer; white-space: nowrap;
     border-bottom: 2px solid var(--accent); user-select: none; }
th:hover { color: var(--accent); }
th .arrow { font-size: 8px; margin-left: 2px; }
td { padding: 3px 6px; border-bottom: 1px solid #222; vertical-align: top; }
tr:hover { background: rgba(233, 69, 96, 0.08); }
tr.err-row { background: rgba(233, 69, 96, 0.12); }
tr.ok-row { }
tr.na-row { opacity: 0.45; }
tr.playing { background: rgba(78, 204, 163, 0.15) !important; outline: 1px solid var(--ok); }

/* Play button */
.play-btn { background: none; border: 1px solid var(--fg2); color: var(--fg); width: 24px;
            height: 22px; border-radius: 3px; cursor: pointer; font-size: 13px;
            display: inline-flex; align-items: center; justify-content: center; padding: 0; }
.play-btn:hover { border-color: var(--ok); color: var(--ok); }
.play-btn.active { border-color: var(--ok); color: var(--ok); background: rgba(78, 204, 163, 0.15); }

/* Badges */
.lang { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 10px;
        font-weight: 700; text-transform: uppercase; min-width: 28px; text-align: center; }
.lang-nah { background: var(--nah); color: #000; }
.lang-spa { background: var(--spa); color: #000; }
.lang-oth { background: var(--oth); color: #fff; }
.lang-may { background: var(--may); color: #000; }
.lang-unk { background: var(--unk); color: #fff; }
.lang-eng { background: #6c5ce7; color: #fff; }
.lang-lat { background: #a29bfe; color: #000; }
.lang-sil { background: #333; color: #666; }

.src { font-size: 9px; padding: 1px 3px; border-radius: 2px; font-weight: 700; }
.src-ft { background: #00b894; color: #000; }
.src-llm { background: #fdcb6e; color: #000; }
.src-whisper { background: #636e72; color: #fff; }

.marker { background: var(--accent); color: #fff; padding: 0 3px; border-radius: 2px;
          font-size: 9px; margin-right: 1px; }
.ejective { background: var(--may); color: #000; }

.ipa-cell { max-width: 200px; word-break: break-all; font-size: 11px; color: var(--fg2); }
.ipa-hl { color: var(--accent); font-weight: 700; }

.error-type { font-size: 10px; font-weight: 700; }
.cost-2 { color: var(--err); font-weight: 700; }
.cost-1 { color: var(--warn); }
.cost-0 { color: var(--fg2); }

.text-cell { max-width: 220px; font-size: 11px; word-break: break-word; overflow: hidden;
             text-overflow: ellipsis; }
.dur { font-size: 10px; color: var(--fg2); white-space: nowrap; }
.tc { font-size: 10px; white-space: nowrap; }

.spk { cursor: help; border-bottom: 1px dotted var(--fg2); }

/* Decision trace */
tr.detail-row td { padding: 4px 8px 8px 36px; border-bottom: 1px solid #333;
                   background: rgba(15, 52, 96, 0.4); }
tr.detail-row:hover { background: rgba(15, 52, 96, 0.4); }
.decision { font-size: 11px; color: var(--fg2); line-height: 1.6; }
.decision .d-item { display: block; padding: 1px 0; }
.decision .d-label { color: var(--accent); font-weight: 600; margin-right: 4px; }
.decision .d-prior { color: var(--warn); }
.decision .d-twopass { color: var(--ok); }
.decision .d-marker { color: var(--nah); }
.decision .d-guard { color: #636e72; }
.prior-bar { display: inline-block; height: 8px; border-radius: 2px; margin-right: 2px;
             vertical-align: middle; }
tr.clickable { cursor: pointer; }

/* Comparison panel */
.comparison { background: var(--bg2); border-bottom: 2px solid var(--bg3); overflow: hidden;
              transition: max-height 0.3s; }
.comparison.collapsed .comp-body { display: none; }
.comp-header { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.comp-header h2 { font-size: 12px; color: var(--accent); }
.comp-header .toggle { color: var(--fg2); font-size: 10px; }
.comp-body { padding: 0 16px 12px; }
.comp-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; padding-top: 8px; }
.comp-bar { display: flex; flex-direction: column; align-items: center; min-width: 52px; }
.comp-bar-inner { width: 44px; border-radius: 3px 3px 0 0; position: relative; transition: height 0.3s; }
.comp-bar-inner .bar-nah { background: var(--nah); opacity: 0.7; position: absolute; bottom: 0; left: 0;
                           width: 21px; border-radius: 3px 0 0 0; }
.comp-bar-inner .bar-spa { background: var(--spa); opacity: 0.7; position: absolute; bottom: 0; right: 0;
                           width: 21px; border-radius: 0 3px 0 0; }
.comp-bar-val { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
.comp-bar-name { font-size: 8px; color: var(--fg2); writing-mode: vertical-rl; text-orientation: mixed;
                 max-height: 80px; overflow: hidden; margin-top: 4px; }
.comp-bar.best .comp-bar-val { color: var(--ok); }
.comp-bar.highlight .comp-bar-inner { outline: 2px solid var(--accent); }
.comp-legend { display: flex; gap: 16px; font-size: 10px; color: var(--fg2); padding: 8px 0 0; }
.comp-legend span { display: flex; align-items: center; gap: 4px; }
.comp-legend .swatch { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>Segment Dashboard</h1>
  <a href="/">&#8592; Annotator</a>
  <div class="stat" id="statTotal">-</div>
  <div class="stat" id="statAcc">-</div>
  <div class="stat err" id="statErr">-</div>
  <div class="stat" id="statCost">-</div>
</div>

<div class="comparison" id="compPanel">
  <div class="comp-header" onclick="toggleComparison()">
    <h2>Config Comparison</h2>
    <span class="toggle" id="compToggle">&#9654; click to load</span>
  </div>
  <div class="comp-body" id="compBody">
    <div class="comp-chart" id="compChart"></div>
    <div class="comp-legend">
      <span><span class="swatch" style="background:var(--fg)"></span> Accuracy</span>
      <span><span class="swatch" style="background:var(--nah)"></span> NAH Recall</span>
      <span><span class="swatch" style="background:var(--spa)"></span> SPA Recall</span>
    </div>
  </div>
</div>

<div class="controls">
  <label>SRT:</label>
  <select id="fSrt" style="min-width:200px"></select>
  <label>Show:</label>
  <select id="fShow">
    <option value="all">All</option>
    <option value="annotated">Annotated</option>
    <option value="errors" selected>Errors</option>
    <option value="correct">Correct</option>
  </select>
  <label>Speaker:</label>
  <select id="fSpeaker"><option value="">all</option></select>
  <label>GT:</label>
  <select id="fGT"><option value="">all</option></select>
  <label>Pred:</label>
  <select id="fPred"><option value="">all</option></select>
  <label>Error:</label>
  <select id="fError"><option value="">all</option></select>
  <label>Src:</label>
  <select id="fSource">
    <option value="">all</option><option value="ft">FT</option>
    <option value="llm">LLM</option><option value="whisper">Whisper</option>
  </select>
  <label>IPA:</label>
  <select id="fMarker">
    <option value="">any</option><option value="has">NAH marker</option>
    <option value="none">no marker</option><option value="ejective">ejective</option>
  </select>
  <label>Search:</label>
  <input type="text" id="fSearch" placeholder="text / IPA / speaker...">
  <button class="btn" onclick="resetFilters()">Reset</button>
  <button class="btn" id="btnFullTrack" onclick="toggleFullTrack()">Full-Track IPA</button>
</div>

<div class="player-bar">
  <audio id="audioEl" preload="none"></audio>
  <span class="player-info" id="playerInfo">Click &#9654; to play a segment</span>
</div>

<div id="count"></div>
<div class="table-wrap">
<table>
<thead>
<tr>
  <th data-col="cue" data-type="num" style="width:30px">#</th>
  <th style="width:28px"></th>
  <th data-col="start_s" data-type="num">Time</th>
  <th data-col="duration" data-type="num">Dur</th>
  <th data-col="speaker">Speaker</th>
  <th data-col="gt_lang">GT</th>
  <th data-col="lang">Pred</th>
  <th data-col="match">OK</th>
  <th data-col="error_type">Error</th>
  <th data-col="cost" data-type="num">$</th>
  <th data-col="source">Src</th>
  <th data-col="text">Whisper Text</th>
  <th data-col="ipa_fused">IPA Fused</th>
  <th data-col="ipa_allo">IPA Allo</th>
  <th data-col="ipa_w2v2">IPA W2V2</th>
  <th data-col="ipa_full_track" class="ft-col" style="display:none">IPA Full-Track</th>
  <th>Markers</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
// --- Config from server ---
const SRT_OPTIONS = {{ srt_options | tojson }};
const GT_PATH = {{ gt_path | tojson }};
const MEDIA_NAME = {{ media_name | tojson }};

const NAH_MARKERS = new Set(["ts", "tɬ", "kʷ", "tʃʼ", "kʼ", "tɕ"]);

let ROWS = [];
let sortCol = 'cue', sortAsc = true;
let playingCue = null, stopTimer = null;
let fullTrackData = null; // {cue: {ipa_full_track, ft_phone_count, ft_nah_markers, ft_ejectives}}
let fullTrackVisible = false;

// --- Init SRT dropdown ---
const srtSel = document.getElementById('fSrt');
SRT_OPTIONS.forEach(o => {
  const opt = document.createElement('option');
  opt.value = o.path; opt.textContent = o.name;
  srtSel.appendChild(opt);
});
// Default to 08_v7_two_pass if available
const best = SRT_OPTIONS.find(o => o.name.includes('08_v7_two_pass'));
if (best) srtSel.value = best.path;

// --- Audio element ---
const audioEl = document.getElementById('audioEl');
if (MEDIA_NAME) audioEl.src = '/media/' + MEDIA_NAME;

audioEl.addEventListener('timeupdate', () => {
  if (playingCue !== null) {
    const row = ROWS.find(r => r.cue === playingCue);
    if (row && audioEl.currentTime >= row.end_s) {
      audioEl.pause();
      stopPlaying();
    }
  }
});

function playSegment(cue) {
  const row = ROWS.find(r => r.cue === cue);
  if (!row) return;

  if (playingCue === cue && !audioEl.paused) {
    audioEl.pause();
    stopPlaying();
    return;
  }

  stopPlaying();
  playingCue = cue;
  audioEl.currentTime = row.start_s;
  audioEl.play();

  // Update UI
  document.querySelectorAll('tr.playing').forEach(el => el.classList.remove('playing'));
  const tr = document.querySelector(`tr[data-cue="${cue}"]`);
  if (tr) tr.classList.add('playing');
  const btn = document.querySelector(`button[data-cue="${cue}"]`);
  if (btn) btn.classList.add('active');

  document.getElementById('playerInfo').innerHTML =
    `<b>#${cue}</b> ${row.speaker} [${row.lang.toUpperCase()}] ${fmtTime(row.start_s)}\u2013${fmtTime(row.end_s)} (${row.duration.toFixed(1)}s)`;
}

function stopPlaying() {
  if (playingCue !== null) {
    const btn = document.querySelector(`button.play-btn.active`);
    if (btn) btn.classList.remove('active');
    document.querySelectorAll('tr.playing').forEach(el => el.classList.remove('playing'));
  }
  playingCue = null;
}

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// --- Data loading ---
async function loadData() {
  const srt = srtSel.value;
  if (!srt) return;
  const url = `/api/dashboard/segments?srt=${encodeURIComponent(srt)}&gt=${encodeURIComponent(GT_PATH)}`;
  const resp = await fetch(url);
  ROWS = await resp.json();
  if (ROWS.error) { alert(ROWS.error); ROWS = []; }
  populateFilters();
  updateStats();
  render();
}

function populateFilters() {
  const speakers = [...new Set(ROWS.map(r => r.speaker))].sort();
  const langs = [...new Set([...ROWS.map(r => r.gt_lang), ...ROWS.map(r => r.lang)].filter(Boolean))].sort();
  const errors = [...new Set(ROWS.filter(r => r.error_type).map(r => r.error_type))];
  // Sort errors by frequency
  const errCount = {};
  errors.forEach(e => { errCount[e] = ROWS.filter(r => r.error_type === e).length; });
  errors.sort((a, b) => errCount[b] - errCount[a]);

  fillSelect('fSpeaker', speakers);
  fillSelect('fGT', langs, v => v.toUpperCase());
  fillSelect('fPred', langs, v => v.toUpperCase());
  fillSelect('fError', errors);
}

function fillSelect(id, items, labelFn) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = labelFn ? labelFn(v) : v;
    sel.appendChild(o);
  });
  sel.value = cur; // restore
}

function updateStats() {
  const annotated = ROWS.filter(r => r.gt_lang).length;
  const correct = ROWS.filter(r => r.match === true).length;
  const errors = ROWS.filter(r => r.match === false).length;
  const cost = ROWS.reduce((s, r) => s + r.cost, 0);
  document.getElementById('statTotal').innerHTML = `Segments: <b>${ROWS.length}</b>`;
  document.getElementById('statAcc').innerHTML = `Accuracy: <b>${correct}/${annotated} (${annotated ? (100*correct/annotated).toFixed(1) : 0}%)</b>`;
  document.getElementById('statErr').innerHTML = `Errors: <b>${errors}</b>`;
  document.getElementById('statCost').innerHTML = `Cost: <b>${cost.toFixed(0)}</b>`;
}

// --- Filtering ---
function getFilters() {
  return {
    show: document.getElementById('fShow').value,
    speaker: document.getElementById('fSpeaker').value,
    gt: document.getElementById('fGT').value,
    pred: document.getElementById('fPred').value,
    error: document.getElementById('fError').value,
    source: document.getElementById('fSource').value,
    marker: document.getElementById('fMarker').value,
    search: document.getElementById('fSearch').value.toLowerCase(),
  };
}

function filterRow(r, f) {
  if (f.show === 'annotated' && !r.gt_lang) return false;
  if (f.show === 'errors' && r.match !== false) return false;
  if (f.show === 'correct' && r.match !== true) return false;
  if (f.speaker && r.speaker !== f.speaker) return false;
  if (f.gt && r.gt_lang !== f.gt) return false;
  if (f.pred && r.lang !== f.pred) return false;
  if (f.error && r.error_type !== f.error) return false;
  if (f.source && r.source !== f.source) return false;
  if (f.marker === 'has' && r.nah_markers.length === 0) return false;
  if (f.marker === 'none' && r.nah_markers.length > 0) return false;
  if (f.marker === 'ejective' && r.ejectives.length === 0) return false;
  if (f.search) {
    const hay = [r.text, r.ipa_fused, r.ipa_allo, r.ipa_w2v2, r.speaker, r.error_type].join(' ').toLowerCase();
    if (!hay.includes(f.search)) return false;
  }
  return true;
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; return sortAsc ? va - vb : vb - va; }
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
}

// --- Rendering ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function hlIPA(ipa) {
  if (!ipa) return '';
  return ipa.split(' ').map(t =>
    NAH_MARKERS.has(t) ? `<span class="ipa-hl">${esc(t)}</span>` : esc(t)
  ).join(' ');
}

function langBadge(l) {
  return l ? `<span class="lang lang-${l}">${l.toUpperCase()}</span>` : '';
}

function priorBar(prior) {
  if (!prior || !prior.prior_counts) return '';
  const counts = prior.prior_counts;
  const total = Object.values(counts).reduce((s, v) => s + v, 0);
  if (total === 0) return '<span style="color:var(--fg2);font-size:10px">no history</span>';
  const parts = [];
  for (const [lang, count] of Object.entries(counts).sort((a, b) => b[1] - a[1])) {
    const pct = Math.round(100 * count / total);
    if (pct < 5) continue;
    const col = lang === 'nah' ? 'var(--nah)' : lang === 'spa' ? 'var(--spa)'
              : lang === 'may' ? 'var(--may)' : 'var(--oth)';
    parts.push(`<span class="prior-bar" style="width:${Math.max(4, pct * 0.6)}px;background:${col}" title="${lang.toUpperCase()} ${count}/${total} (${pct}%)"></span>`);
  }
  return parts.join('') + `<span style="font-size:9px;color:var(--fg2);margin-left:3px">${total}</span>`;
}

function decisionHTML(r) {
  const d = r.decision || [];
  if (d.length === 0) return '<span style="color:var(--fg2)">no trace</span>';
  const lines = d.map(item => {
    let cls = 'd-item';
    if (item.includes('inline-prior')) cls += ' d-prior';
    else if (item.includes('two-pass')) cls += ' d-twopass';
    else if (item.includes('marker') || item.includes('tɬ')) cls += ' d-marker';
    else if (item.includes('guard') || item.includes('SPA text')) cls += ' d-guard';
    return `<span class="${cls}">${esc(item)}</span>`;
  });
  // Add prior visualization
  const pb = priorBar(r.prior);
  if (pb) lines.push(`<span class="d-item"><span class="d-label">speaker profile:</span> ${pb}</span>`);
  return lines.join('');
}

let expandedCue = null;

function toggleDetail(cue) {
  const existing = document.getElementById(`detail-${cue}`);
  if (existing) {
    existing.remove();
    expandedCue = expandedCue === cue ? null : expandedCue;
    return;
  }
  // Collapse previous
  if (expandedCue !== null) {
    const prev = document.getElementById(`detail-${expandedCue}`);
    if (prev) prev.remove();
  }
  expandedCue = cue;

  const r = ROWS.find(row => row.cue === cue);
  if (!r) return;

  const tr = document.querySelector(`tr[data-cue="${cue}"]`);
  if (!tr) return;

  const detailTr = document.createElement('tr');
  detailTr.id = `detail-${cue}`;
  detailTr.className = 'detail-row';
  const td = document.createElement('td');
  td.colSpan = fullTrackVisible ? 17 : 16;
  td.innerHTML = `<div class="decision">${decisionHTML(r)}</div>`;
  detailTr.appendChild(td);
  tr.after(detailTr);
}

function render() {
  const f = getFilters();
  let filtered = sortRows(ROWS.filter(r => filterRow(r, f)));

  document.getElementById('count').textContent =
    `Showing ${filtered.length} of ${ROWS.length}` +
    (filtered.length !== ROWS.length ? ' (filtered)' : '');

  const tbody = document.getElementById('tbody');
  const html = [];
  for (const r of filtered) {
    const cls = (r.match === true ? 'ok-row' : r.match === false ? 'err-row' : 'na-row') + ' clickable';
    const matchIcon = r.match === true ? '<span style="color:var(--ok)">&#10003;</span>'
                    : r.match === false ? '<span style="color:var(--err)">&#10007;</span>'
                    : '<span style="color:var(--unk)">-</span>';
    const costCls = r.cost >= 2 ? 'cost-2' : r.cost >= 1 ? 'cost-1' : 'cost-0';
    const markers = r.nah_markers.map(m => `<span class="marker">${esc(m)}</span>`).join('') +
                    r.ejectives.map(m => `<span class="marker ejective">${esc(m)}</span>`).join('');
    const srcCls = r.source === 'ft' ? 'src-ft' : r.source === 'llm' ? 'src-llm' : 'src-whisper';

    html.push(`<tr class="${cls}" data-cue="${r.cue}" onclick="toggleDetail(${r.cue})">
      <td>${r.cue}</td>
      <td><button class="play-btn" data-cue="${r.cue}" onclick="event.stopPropagation();playSegment(${r.cue})" title="Play">&#9654;</button></td>
      <td class="tc">${fmtTime(r.start_s)}</td>
      <td class="dur">${r.duration.toFixed(1)}s</td>
      <td><span class="spk" title="${esc(r.speaker)}">${esc(r.speaker.replace('SPEAKER_','S'))}</span></td>
      <td>${langBadge(r.gt_lang)}</td>
      <td>${langBadge(r.lang)}</td>
      <td style="text-align:center">${matchIcon}</td>
      <td class="error-type">${esc(r.error_type)}</td>
      <td class="${costCls}">${r.cost ? r.cost.toFixed(1) : ''}</td>
      <td><span class="src ${srcCls}">${r.source.toUpperCase()}</span></td>
      <td class="text-cell" title="${esc(r.text)}">${esc(r.text.substring(0, 60))}</td>
      <td class="ipa-cell">${hlIPA(r.ipa_fused)}</td>
      <td class="ipa-cell">${hlIPA(r.ipa_allo)}</td>
      <td class="ipa-cell">${hlIPA(r.ipa_w2v2)}</td>
      <td class="ipa-cell ft-col" style="${fullTrackVisible ? '' : 'display:none'}">${fullTrackVisible && fullTrackData && fullTrackData[r.cue] ? hlIPA(fullTrackData[r.cue].ipa_full_track) + ' <span style="color:var(--fg2);font-size:9px">(' + fullTrackData[r.cue].ft_phone_count + 'p)</span>' : ''}</td>
      <td>${markers}</td>
    </tr>`);
  }
  tbody.innerHTML = html.join('');
  expandedCue = null;
}

function resetFilters() {
  ['fSpeaker','fGT','fPred','fError','fSource','fMarker'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fShow').value = 'all';
  document.getElementById('fSearch').value = '';
  render();
}

// --- Sort ---
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('th .arrow').forEach(a => a.remove());
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = sortAsc ? ' \u25B2' : ' \u25BC';
    th.appendChild(arrow);
    render();
  });
});

// --- Filter events ---
['fShow','fSpeaker','fGT','fPred','fError','fSource','fMarker'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('fSearch').addEventListener('input', render);
srtSel.addEventListener('change', loadData);

// --- Keyboard shortcuts ---
document.addEventListener('keydown', e => {
  // Space = toggle play on focused/playing segment
  if (e.code === 'Space' && playingCue !== null && !e.target.matches('input,select,textarea')) {
    e.preventDefault();
    if (audioEl.paused) audioEl.play();
    else audioEl.pause();
  }
});

// --- Full-Track IPA ---
async function toggleFullTrack() {
  if (fullTrackVisible) {
    fullTrackVisible = false;
    document.getElementById('btnFullTrack').classList.remove('active');
    document.querySelectorAll('.ft-col').forEach(el => el.style.display = 'none');
    render();
    return;
  }
  if (!fullTrackData) {
    const srt = srtSel.value;
    if (!srt) return;
    const btn = document.getElementById('btnFullTrack');
    btn.textContent = 'Loading...';
    try {
      const resp = await fetch(`/api/dashboard/allo_full_track?srt=${encodeURIComponent(srt)}`);
      if (!resp.ok) {
        const err = await resp.json();
        alert(err.error || 'Full-track data not available');
        btn.textContent = 'Full-Track IPA';
        return;
      }
      const data = await resp.json();
      fullTrackData = {};
      for (const seg of data.segments) {
        fullTrackData[seg.cue] = seg;
      }
      btn.textContent = `Full-Track IPA (${data.total_phones}p)`;
    } catch (e) {
      alert('Failed to load full-track data: ' + e);
      btn.textContent = 'Full-Track IPA';
      return;
    }
  }
  fullTrackVisible = true;
  document.getElementById('btnFullTrack').classList.add('active');
  document.querySelectorAll('.ft-col').forEach(el => el.style.display = '');
  render();
}

// Reset full-track when SRT changes
srtSel.addEventListener('change', () => { fullTrackData = null; fullTrackVisible = false; });

// --- Config Comparison ---
let compLoaded = false;
let compExpanded = false;

async function toggleComparison() {
  const panel = document.getElementById('compPanel');
  const toggle = document.getElementById('compToggle');

  if (compExpanded) {
    panel.classList.add('collapsed');
    compExpanded = false;
    toggle.textContent = '▶ click to expand';
    return;
  }

  compExpanded = true;
  panel.classList.remove('collapsed');

  if (!compLoaded) {
    toggle.textContent = '▼ loading...';
    try {
      const resp = await fetch('/api/dashboard/comparison');
      const data = await resp.json();
      if (data.error) { toggle.textContent = '▶ ' + data.error; return; }
      renderComparison(data.configs);
      compLoaded = true;
      toggle.textContent = `▼ ${data.configs.length} configs, ${data.gt_count} GT segments`;
    } catch (e) {
      toggle.textContent = '▶ failed: ' + e;
    }
  } else {
    toggle.textContent = toggle.textContent.replace('▶', '▼');
  }
}

function renderComparison(configs) {
  const chart = document.getElementById('compChart');
  const maxAcc = Math.max(...configs.map(c => c.accuracy), 80);
  const scale = 110 / maxAcc;

  // Find current SRT selection
  const curSrt = srtSel.value;
  const curName = curSrt ? curSrt.split('/').pop().replace('.srt', '') : '';

  chart.innerHTML = configs.map((c, i) => {
    const h = c.accuracy * scale;
    const nahH = c.nah_recall * scale;
    const spaH = c.spa_recall * scale;
    const isBest = i === 0;
    const isCurrent = c.name === curName;
    const cls = (isBest ? ' best' : '') + (isCurrent ? ' highlight' : '');
    const shortName = c.name.replace(/^\\d+_v7_/, '').replace(/_/g, ' ');
    return `<div class="comp-bar${cls}" title="${c.name}\\nAcc: ${c.accuracy}%  NAH: ${c.nah_recall}%  SPA: ${c.spa_recall}%\\nS→N: ${c.spa_as_nah}  N→S: ${c.nah_as_spa}">
      <span class="comp-bar-val">${c.accuracy}%</span>
      <div class="comp-bar-inner" style="height:${h}px;background:var(--bg3)">
        <div class="bar-nah" style="height:${nahH}px"></div>
        <div class="bar-spa" style="height:${spaH}px"></div>
      </div>
      <span class="comp-bar-name">${shortName}</span>
    </div>`;
  }).join('');
}

// Reload comparison when SRT changes to update highlight
srtSel.addEventListener('change', () => { if (compLoaded) { compLoaded = false; if (compExpanded) toggleComparison(); } });

// Start collapsed
document.getElementById('compPanel').classList.add('collapsed');

// --- Load on ready ---
loadData();
</script>
</body>
